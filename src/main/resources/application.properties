spring.application.name=chat
server.port=8080

# ===============================
# DATABASE CONFIGURATION (MYSQL)
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/kt_guru?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=admin

# Automatically create/update tables based on our JPA entities
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ===============================
# MULTIPART UPLOADS
# ===============================
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=55MB

# ===============================
# KT GURU AI CONFIGURATION
# ===============================
# Local Ollama connection
kt-guru.ai.ollama.base-url=http://localhost:11434
# The LLM used to generate answers and summarize
kt-guru.ai.ollama.chat-model=llama3
# The model used to convert text/code into mathematical vectors
kt-guru.ai.ollama.embedding-model=nomic-embed-text
# Local file to store the vector database
kt-guru.ai.vector-store.file-path=kt_guru_embeddings.json
# RAG retrieval
kt-guru.ai.rag.max-segments=14
kt-guru.ai.rag.min-score=0.42
# Clarification when query is very short and retrieval is weak
kt-guru.ai.clarify.max-chars=48
kt-guru.ai.clarify.min-score=0.38
# Recent chat turns sent to the model (pairs of user+assistant)
kt-guru.ai.chat.history-pairs=6